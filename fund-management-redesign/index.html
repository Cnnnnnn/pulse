<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width  initial-scale=1, viewport-fit=cover" />
  <title>盈策基金 · 基金管理系统</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    // 主题防闪烁：在首帧前应用已保存主题
    (function () {
      try {
        var t = localStorage.getItem("fm-theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="app" id="app">
    <!-- ===== Top nav ===== -->
    <header class="topnav">
      <button class="icon-btn menu-toggle" id="menuToggle" aria-label="菜单">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="brand">
        <div class="brand-mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 3 7-8"/><path d="M16 7h4v4"/></svg>
        </div>
        <div class="brand-name">盈策基金<small>YINCE FUND OS</small></div>
      </div>
      <label class="nav-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input type="search" placeholder="搜索基金名称、代码或经理…" id="globalSearch" aria-label="搜索" />
      </label>
      <div class="nav-actions">
        <button class="icon-btn" id="refreshBtn" aria-label="刷新数据" title="刷新数据">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
        </button>
        <button class="icon-btn" id="themeToggle" aria-label="切换主题" title="切换深色 / 浅色">
          <svg class="ico-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="ico-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
        </button>
        <button class="icon-btn" aria-label="通知"><span class="dot"></span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        </button>
        <div class="avatar" title="林知远">林</div>
      </div>
    </header>

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="nav-section">总览</div>
      <a class="nav-link" href="#/dashboard" data-route="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        概览仪表盘
      </a>
      <a class="nav-link" href="#/funds" data-route="funds">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18M3 12h18M3 17h18"/></svg>
        基金列表
      </a>
      <a class="nav-link" href="#/trade" data-route="trade">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16V4M7 4L3 8M7 4l4 4"/><path d="M17 8v12M17 20l4-4M17 20l-4-4"/></svg>
        交易管理
      </a>
      <div class="nav-section">分析</div>
      <a class="nav-link" href="#/dashboard" data-route="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
        收益分析
      </a>
      <a class="nav-link" href="#/dashboard" data-route="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"/></svg>
        风险中心
      </a>
      <div class="sidebar-foot">
        <div class="market-pill">
          <span class="live-dot"></span>
          <span class="muted">行情实时连接</span>
          <span class="num" style="margin-left:auto;font-size:11px" id="clock">--:--:--</span>
        </div>
      </div>
    </aside>

    <!-- ===== Main ===== -->
    <main class="main" id="main">
      <div id="view"></div>
    </main>

    <div class="scrim" id="scrim"></div>
  </div>

  <div class="toast-stack" id="toastStack" aria-live="polite"></div>
  <div class="chart-tip" id="chartTip"></div>

  <script src="data.js"></script>
  <script src="charts.js"></script>
  <script src="app.js"></script>
</body>
</html>
