<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>贵金属模块 · 重新设计原型（方案 B + V2 金点缀）</title>
<style>
  /* ============================================================
     设计令牌 — 锚定项目统一设计体系 (ui-design-system.md)
     Apple 原生美学 · 浅色毛玻璃默认 · 暗色靠表面提亮
     A 股: 涨红(--color-up) / 跌绿(--color-down)
     模块品牌点缀: 香槟金 --metals-gold (用量 <5%)
     ============================================================ */
  :root {
    /* 原始色板 (来自体系) */
    --gray-50:#f5f5f7; --gray-100:#e5e5ea; --gray-200:#d1d1d6;
    --gray-300:#aeaeb2; --gray-400:#8e8e93; --gray-500:#6e6e73;
    --gray-600:#48484a; --gray-700:#2c2c2e; --gray-800:#1d1d1f;

    --blue-500:#007aff; --blue-600:#0066d6; --blue-700:#0055a4;
    --green-500:#34c759; --orange-500:#ff9500; --red-500:#ff3b30;

    /* 语义令牌 */
    --accent-primary:var(--blue-500);
    --accent-primary-hover:var(--blue-600);
    --accent-primary-press:var(--blue-700);
    --color-success:var(--green-500);
    --color-warning:var(--orange-500);
    --color-danger:var(--red-500);
    --color-info:var(--blue-500);

    --color-up:var(--red-500);     /* 涨红 (A股) */
    --color-down:var(--green-500); /* 跌绿 */

    --text-primary:var(--gray-800);
    --text-secondary:var(--gray-500);
    --text-tertiary:var(--gray-400);
    --text-inverse:#ffffff;

    --bg-primary:rgba(255,255,255,0.82);
    --bg-secondary:#f5f5f7;
    --surface:#ffffff;
    --surface-2:#fbfbfd;
    --border:rgba(0,0,0,0.08);
    --border-strong:rgba(0,0,0,0.16);
    --focus-ring:rgba(0,122,255,0.45);

    --metals-gold:#b8893b;          /* 香槟金 (浅底深字 ≥4.5:1) */
    --metals-gold-soft:rgba(184,137,59,0.12);
    --metals-gold-line:rgba(184,137,59,0.45);

    /* 字体 — 沿用系统字体栈 (SF Pro / PingFang)，数字 tabular-nums */
    --font-system:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Helvetica Neue",sans-serif;
    --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;

    --fs-2xs:10px; --fs-xs:11px; --fs-sm:12px; --fs-md:13px;
    --fs-base:14px; --fs-lg:15px; --fs-xl:17px; --fs-2xl:18px;
    --fs-3xl:20px; --fs-4xl:28px;

    --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px;
    --sp-5:20px; --sp-6:24px; --sp-8:32px;

    --radius-sm:6px; --radius-md:10px; --radius-lg:14px; --radius-pill:999px;

    --shadow-sm:0 1px 2px rgba(0,0,0,0.06);
    --shadow-md:0 4px 12px rgba(0,0,0,0.10);
    --shadow-lg:0 12px 32px rgba(0,0,0,0.18);

    --ease-out: cubic-bezier(0.22, 1, 0.36, 1); /* ease-out-quart 近似 */
    --t-fast:160ms; --t-norm:280ms;
    --row-h:48px;
  }
  :root[data-theme="dark"] {
    --text-primary:#f5f5f7; --text-secondary:#aeaeb2; --text-tertiary:#8e8e93;
    --bg-primary:rgba(30,30,30,0.88);
    --bg-secondary:#2c2c2e;
    --surface:#1c1c1e; --surface-2:#232325;
    --border:rgba(255,255,255,0.10); --border-strong:rgba(255,255,255,0.20);
    --focus-ring:rgba(10,132,255,0.55);
    --metals-gold:#e2c275;          /* 暗底亮金 (UI ≥3:1) */
    --metals-gold-soft:rgba(226,194,117,0.14);
    --metals-gold-line:rgba(226,194,117,0.5);
    --shadow-sm:0 1px 2px rgba(0,0,0,0.4);
    --shadow-md:0 4px 14px rgba(0,0,0,0.5);
    --shadow-lg:0 12px 32px rgba(0,0,0,0.6);
  }

  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; }
  body {
    font-family:var(--font-system);
    font-size:var(--fs-base);
    color:var(--text-primary);
    background:
      radial-gradient(1200px 600px at 80% -10%, var(--metals-gold-soft), transparent 60%),
      linear-gradient(180deg, var(--bg-secondary), var(--bg-primary));
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .num { font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; }
  button { font-family:inherit; cursor:pointer; }
  :focus-visible { outline:2px solid var(--focus-ring); outline-offset:2px; border-radius:var(--radius-sm); }
  .up { color:var(--color-up); }
  .down { color:var(--color-down); }
  .muted { color:var(--text-tertiary); }
  .sec { color:var(--text-secondary); }

  /* ---------- 顶栏 (模块上下文) ---------- */
  .appbar {
    display:flex; align-items:center; gap:var(--sp-3);
    padding:var(--sp-3) var(--sp-5);
    background:var(--bg-primary);
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:30;
  }
  .appbar .brand { display:flex; align-items:center; gap:var(--sp-2); font-weight:600; }
  .appbar .brand .dot { width:10px; height:10px; border-radius:50%; background:linear-gradient(135deg,var(--metals-gold),#e2c275); box-shadow:0 0 0 3px var(--metals-gold-soft); }
  .appbar .ctx { font-size:var(--fs-xs); color:var(--text-tertiary); margin-left:2px; }
  .appbar .spacer { flex:1; }
  .ghost-btn {
    display:inline-flex; align-items:center; gap:6px;
    height:32px; padding:0 var(--sp-3);
    background:transparent; color:var(--text-secondary);
    border:1px solid var(--border); border-radius:var(--radius-md);
    font-size:var(--fs-sm); transition:background var(--t-fast) var(--ease-out), color var(--t-fast) var(--ease-out);
  }
  .ghost-btn:hover { background:var(--bg-secondary); color:var(--text-primary); }

  /* 沙箱横幅 */
  .sandbox {
    display:flex; align-items:center; gap:var(--sp-2);
    padding:var(--sp-2) var(--sp-5);
    background:var(--metals-gold-soft);
    border-bottom:1px solid var(--metals-gold-line);
    color:var(--metals-gold);
    font-size:var(--fs-xs); font-weight:600;
  }
  :root[data-theme="dark"] .sandbox { color:var(--metals-gold); }
  .sandbox .pill {
    background:var(--metals-gold); color:#1d1d1f;
    padding:2px 8px; border-radius:var(--radius-pill); font-weight:700; letter-spacing:.03em;
  }

  /* ---------- 模块头 ---------- */
  .metals-header {
    display:flex; align-items:center; gap:var(--sp-4); flex-wrap:wrap;
    padding:var(--sp-4) var(--sp-5);
    border-bottom:1px solid var(--border);
  }
  .mh-title { display:flex; align-items:center; gap:var(--sp-2); }
  .mh-title .medal {
    width:34px; height:34px; border-radius:10px; display:grid; place-items:center;
    background:linear-gradient(135deg, var(--metals-gold-soft), transparent);
    border:1px solid var(--metals-gold-line); color:var(--metals-gold);
  }
  .mh-title h1 { font-size:var(--fs-3xl); margin:0; font-weight:600; letter-spacing:-0.01em; }
  .mh-title .sub { font-size:var(--fs-xs); color:var(--text-tertiary); }
  .mh-right { margin-left:auto; display:flex; align-items:center; gap:var(--sp-2); }
  .badge {
    display:inline-flex; align-items:center; gap:6px; height:26px; padding:0 10px;
    border-radius:var(--radius-pill); font-size:var(--fs-xs); font-weight:600;
    border:1px solid var(--border);
  }
  .badge .led { width:7px; height:7px; border-radius:50%; }
  .badge.open { color:var(--color-success); border-color:color-mix(in srgb,var(--color-success) 40%, transparent); background:color-mix(in srgb,var(--color-success) 10%, transparent); }
  .badge.open .led { background:var(--color-success); box-shadow:0 0 0 3px color-mix(in srgb,var(--color-success) 25%, transparent); }
  .badge.sandbox { color:var(--metals-gold); border-color:var(--metals-gold-line); background:var(--metals-gold-soft); }

  /* ---------- 主网格 ---------- */
  .metals-main {
    display:grid;
    grid-template-columns: minmax(300px, 0.9fr) minmax(360px, 1.2fr);
    gap:var(--sp-4);
    padding:var(--sp-4) var(--sp-5) var(--sp-8);
    align-items:start;
    container-type:inline-size;
  }
  .panel {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow-sm);
    overflow:hidden;
  }
  .panel-head {
    display:flex; align-items:center; gap:var(--sp-2);
    padding:var(--sp-3) var(--sp-4);
    border-bottom:1px solid var(--border);
  }
  .panel-head h2 { font-size:var(--fs-lg); margin:0; font-weight:600; }
  .panel-head .tag { font-size:var(--fs-2xs); color:var(--text-tertiary); border:1px solid var(--border); padding:1px 7px; border-radius:var(--radius-pill); }

  /* 行情榜 */
  .watch-row {
    display:grid;
    grid-template-columns: 1.3fr 1fr 0.9fr auto 30px;
    align-items:center; gap:var(--sp-3);
    height:var(--row-h);
    padding:0 var(--sp-4);
    border-bottom:1px solid var(--border);
    cursor:pointer; position:relative;
    transition:background var(--t-fast) var(--ease-out);
  }
  .watch-row:last-child { border-bottom:none; }
  .watch-row:hover { background:var(--bg-secondary); }
  .watch-row.selected { background:var(--metals-gold-soft); }
  .watch-row.selected::before {
    content:""; position:absolute; left:0; top:8px; bottom:8px; width:3px;
    border-radius:2px; background:var(--metals-gold);
  }
  .wr-name { display:flex; flex-direction:column; gap:1px; min-width:0; }
  .wr-name .short { font-weight:600; font-size:var(--fs-base); }
  .wr-name .tagline { font-size:var(--fs-2xs); color:var(--text-tertiary); }
  .wr-price { text-align:right; font-weight:600; font-size:var(--fs-base); }
  .wr-chg { text-align:right; font-size:var(--fs-sm); font-weight:600; display:flex; flex-direction:column; align-items:flex-end; gap:1px; }
  .wr-chg .amt { font-size:var(--fs-2xs); font-weight:400; color:var(--text-tertiary); }
  .wr-spark { width:84px; height:30px; }
  .pin {
    width:30px; height:30px; display:grid; place-items:center; border-radius:8px;
    background:transparent; border:1px solid transparent; color:var(--text-tertiary);
    transition:color var(--t-fast), background var(--t-fast);
  }
  .pin:hover { background:var(--bg-secondary); color:var(--text-primary); }
  .pin.active { color:var(--metals-gold); }

  /* 详情面板 */
  .detail-head { padding:var(--sp-4); display:flex; align-items:flex-end; gap:var(--sp-3); flex-wrap:wrap; }
  .detail-head .name { font-size:var(--fs-2xl); font-weight:600; }
  .detail-head .px { font-size:var(--fs-4xl); font-weight:700; line-height:1; }
  .detail-head .chg { font-size:var(--fs-lg); font-weight:600; }
  .detail-head .right { margin-left:auto; display:flex; gap:var(--sp-2); }

  .seg {
    display:inline-flex; padding:3px; gap:3px; background:var(--bg-secondary);
    border-radius:var(--radius-md); border:1px solid var(--border);
  }
  .seg button {
    border:none; background:transparent; color:var(--text-secondary);
    height:28px; padding:0 12px; border-radius:8px; font-size:var(--fs-sm); font-weight:500;
    transition:background var(--t-fast), color var(--t-fast);
  }
  .seg button.on { background:var(--surface); color:var(--text-primary); box-shadow:var(--shadow-sm); }

  .chart-card { padding:var(--sp-3) var(--sp-4) var(--sp-4); }
  .chart-card .seg { margin-bottom:var(--sp-2); }
  .kline { width:100%; height:200px; display:block; }
  .vol { width:100%; height:42px; display:block; margin-top:4px; }

  .ind-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:var(--sp-2); padding:var(--sp-3) var(--sp-4); }
  .ind { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-md); padding:var(--sp-2) var(--sp-3); }
  .ind .k { font-size:var(--fs-2xs); color:var(--text-tertiary); }
  .ind .v { font-size:var(--fs-md); font-weight:600; margin-top:2px; }

  /* （交易下单 / 持仓区块已移除 — 纯行情数据看板） */

  /* Toast */
  .toast-wrap { position:fixed; right:var(--sp-5); bottom:var(--sp-5); display:flex; flex-direction:column; gap:var(--sp-2); z-index:60; }
  .toast {
    background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow-lg);
    border-radius:var(--radius-md); padding:var(--sp-3) var(--sp-4); font-size:var(--fs-sm);
    display:flex; align-items:center; gap:var(--sp-2); min-width:220px;
    animation:toast-in var(--t-norm) var(--ease-out);
  }
  .toast .ic { width:18px; height:18px; border-radius:50%; display:grid; place-items:center; color:#fff; font-size:11px; font-weight:700; }
  .toast.ok .ic { background:var(--color-success); }
  .toast.info .ic { background:var(--accent-primary); }
  .toast.warn .ic { background:var(--color-warning); }
  @keyframes toast-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  /* 容器查询内微调 */
  @container (max-width: 520px) {
    .ind-grid { grid-template-columns:repeat(2,1fr); }
  }

  /* ---------- 响应式: <900px 详情变抽屉 ---------- */
  @media (max-width: 900px) {
    .metals-main { grid-template-columns:1fr; }
    .detail-panel {
      position:fixed; inset:auto 0 0 0; max-height:88vh; overflow:auto;
      border-radius:var(--radius-lg) var(--radius-lg) 0 0; z-index:50;
      transform:translateY(102%); transition:transform var(--t-norm) var(--ease-out);
      box-shadow:var(--shadow-lg);
    }
    .detail-panel.open { transform:translateY(0); }
    .scrim { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:45; opacity:0; pointer-events:none; transition:opacity var(--t-norm); }
    .scrim.show { opacity:1; pointer-events:auto; }
  }
  @media (min-width: 901px) {
    .scrim { display:none; }
    .detail-close { display:none; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
  }
</style>
</head>
<body>

  <div class="appbar">
    <div class="brand"><span class="dot"></span> Pulse</div>
    <span class="ctx">· 模块：贵金属（重新设计原型）</span>
    <span class="spacer"></span>
    <button class="ghost-btn" id="themeBtn" aria-label="切换明暗主题">🌗 主题</button>
  </div>

  <div class="sandbox">
    <span class="pill">示例数据</span>
    行情为演示数据，仅用于界面展示，不构成任何交易建议。
  </div>

  <!-- 模块头 -->
  <header class="metals-header">
    <div class="mh-title">
      <span class="medal">🥇</span>
      <div>
        <h1>贵金属</h1>
        <div class="sub">国内积存金 · 国际贵金属行情</div>
      </div>
    </div>
    <div class="mh-right">
      <span class="badge open"><span class="led"></span>实时行情</span>
      <button class="ghost-btn" id="refreshBtn" aria-label="刷新行情">⟳ 刷新</button>
    </div>
  </header>

  <!-- 主网格 -->
  <main class="metals-main">
    <!-- 左: 行情榜 -->
    <section class="panel" aria-label="行情榜">
      <div class="panel-head">
        <h2>行情</h2>
        <span class="tag">4 品种 · ¥/克</span>
      </div>
      <div id="watchlist"></div>
    </section>

    <!-- 右: 详情抽屉 (桌面并排 / 移动覆盖) -->
    <div class="scrim" id="scrim"></div>
    <section class="panel detail-panel" id="detailPanel" aria-label="品种详情">
      <div class="panel-head">
        <h2 id="dName">—</h2>
        <span class="tag" id="dTag">—</span>
        <span class="spacer" style="flex:1"></span>
        <button class="ghost-btn detail-close" id="detailClose" aria-label="关闭详情">关闭</button>
      </div>

      <div class="detail-head">
        <div>
          <div class="name" id="dFullName">—</div>
          <div class="px num" id="dPrice">—</div>
        </div>
        <div class="chg num" id="dChg">—</div>
      </div>

      <!-- K线 -->
      <div class="chart-card">
        <div class="seg" id="intervalSeg" role="tablist" aria-label="周期切换">
          <button class="on" data-iv="day" role="tab">日</button>
          <button data-iv="week" role="tab">周</button>
          <button data-iv="month" role="tab">月</button>
        </div>
        <svg class="kline" id="kline" viewBox="0 0 600 200" preserveAspectRatio="none" aria-label="K线图"></svg>
        <svg class="vol" id="vol" viewBox="0 0 600 42" preserveAspectRatio="none" aria-label="成交量"></svg>
      </div>

      <!-- 指标 -->
      <div class="ind-grid num">
        <div class="ind"><div class="k">现价</div><div class="v" id="iNow">—</div></div>
        <div class="ind"><div class="k">涨跌</div><div class="v" id="iChg">—</div></div>
        <div class="ind"><div class="k">振幅</div><div class="v" id="iAmp">—</div></div>
        <div class="ind"><div class="k">52周高</div><div class="v" id="iHi">—</div></div>
        <div class="ind"><div class="k">52周低</div><div class="v" id="iLo">—</div></div>
      </div>

      <!-- 持仓 / 交易下单区块已移除（纯行情数据看板，仅展示行情榜 + K线/指标） -->
    </section>
  </main>

  <div class="toast-wrap" id="toasts" aria-live="polite"></div>

<script>
/* ---------- 数据 (Mock) ---------- */
const METALS = [
  { id:'XAU',  short:'XAU',  full:'国际黄金',  tag:'国际 · 盎司', unit:'oz', price:562.40, chgPct:+1.24, base:548,  hi:589.0, lo:498.0 },
  { id:'XAG',  short:'XAG',  full:'国际白银',  tag:'国际 · 盎司', unit:'oz', price:7.18,  chgPct:-0.62, base:7.2,  hi:8.9,   lo:5.4 },
  { id:'AU9999', short:'AU9999', full:'黄金9999', tag:'国内 · 克', unit:'g', price:558.90, chgPct:+0.96, base:554,  hi:582.0, lo:495.0 },
  { id:'AG9999', short:'AG9999', full:'白银9999', tag:'国内 · 克', unit:'g', price:7.05,  chgPct:-0.41, base:7.08, hi:8.7,   lo:5.2 },
];

const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------- 工具 ---------- */
const $ = (s,el=document)=>el.querySelector(s);
const fmt = (v,d=2)=> '¥'+Number(v).toLocaleString('zh-CN',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct = v => (v>=0?'+':'−')+Math.abs(v).toFixed(2)+'%';

/* ---------- 渲染行情榜 ---------- */
const watchlist = $('#watchlist');
function sparkline(points, up){
  const w=84,h=30,max=Math.max(...points),min=Math.min(...points),rng=(max-min)||1;
  const pts = points.map((p,i)=>`${(i/(points.length-1))*w},${h-((p-min)/rng)*(h-4)-2}`).join(' ');
  const c = up>0 ? 'var(--color-up)' : up<0 ? 'var(--color-down)' : 'var(--text-tertiary)';
  return `<svg class="wr-spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}
function renderWatch(){
  watchlist.innerHTML = METALS.map(m=>{
    const up=m.chgPct, cls=up>0?'up':up<0?'down':'';
    const arrow=up>0?'▲':up<0?'▼':'—';
    const series=genSeries(m.base,30);
    const pinned = m.id==='AU9999';
    return `<div class="watch-row ${m.id===state.sel?'selected':''}" data-id="${m.id}" role="button" tabindex="0" aria-label="${m.full} 现价 ${fmt(m.price)} ${fmtPct(up)}">
      <div class="wr-name"><span class="short">${m.short}</span><span class="tagline">${m.tag}</span></div>
      <div class="wr-price num">${fmt(m.price)}</div>
      <div class="wr-chg num ${cls}"><span>${arrow} ${fmtPct(up)}</span><span class="amt">${up>=0?'+':'−'}${fmt(Math.abs(m.price-m.base))}/克</span></div>
      ${sparkline(series, up)}
      <button class="pin ${pinned?'active':''}" title="关注" aria-label="关注">${pinned?'★':'☆'}</button>
    </div>`;
  }).join('');
  watchlist.querySelectorAll('.watch-row').forEach(r=>{
    const act=()=>selectMetal(r.dataset.id);
    r.addEventListener('click',e=>{ if(e.target.closest('.pin'))return; act(); });
    r.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();act();} });
    r.querySelector('.pin').addEventListener('click',function(){ this.classList.toggle('active'); this.textContent=this.classList.contains('active')?'★':'☆'; toast(this.classList.contains('active')?'已加入关注':'已取消关注','info'); });
  });
}

/* 确定性伪随机序列 */
function genSeries(base,n){
  const out=[]; let v=base;
  for(let i=0;i<n;i++){ v += Math.sin(i*1.3+base)*base*0.012 + (Math.random()-0.5)*base*0.01; out.push(v); }
  return out;
}

/* ---------- 选中品种 → 详情 ---------- */
const state = { sel:'AU9999', iv:'day' };
function selectMetal(id){
  state.sel=id;
  renderWatch();
  renderDetail();
  if(window.innerWidth<=900){ $('#detailPanel').classList.add('open'); $('#scrim').classList.add('show'); }
}
function renderDetail(){
  const m = METALS.find(x=>x.id===state.sel);
  $('#dName').textContent=m.short; $('#dTag').textContent=m.tag;
  $('#dFullName').textContent=m.full;
  $('#dPrice').textContent=fmt(m.price);
  const cls=m.chgPct>0?'up':m.chgPct<0?'down':'';
  const arrow=m.chgPct>0?'▲':m.chgPct<0?'▼':'—';
  $('#dChg').className='chg num '+cls;
  $('#dChg').textContent=`${arrow} ${fmtPct(m.chgPct)}  (${m.chgPct>=0?'+':'−'}${fmt(Math.abs(m.price-m.base))}/克)`;
  // 指标
  $('#iNow').textContent=fmt(m.price);
  const ic=$('#iChg'); ic.textContent=fmtPct(m.chgPct); ic.className='v num '+cls;
  $('#iAmp').textContent=((Math.random()*2+0.8).toFixed(2))+'%';
  $('#iHi').textContent=fmt(m.hi); $('#iLo').textContent=fmt(m.lo);
  drawKline(m);
}

/* ---------- K线 (Mock candlestick) ---------- */
function drawKline(m){
  const N = state.iv==='day'?34:state.iv==='week'?22:14;
  const series=genSeries(m.base,N);
  const svg=$('#kline'); const W=600,H=200,pad=8;
  const vals=series; const max=Math.max(...vals)*1.02, min=Math.min(...vals)*0.98, rng=(max-min)||1;
  const cw=W/N;
  let body='';
  series.forEach((v,i)=>{
    const o=series[i>0?i-1:i]; const c=v;
    const x=i*cw+cw/2;
    const yo=H-pad-((o-min)/rng)*(H-2*pad);
    const yc=H-pad-((c-min)/rng)*(H-2*pad);
    const top=Math.min(yo,yc), hgt=Math.max(2,Math.abs(yc-yo));
    const up=c>=o;
    const col=up?'var(--color-up)':'var(--color-down)';
    const hl=H-pad-((v+ (Math.random()*0.6+0.2)*(max-min)/N)/rng)*(H-2*pad);
    const ll=H-pad-((v- (Math.random()*0.6+0.2)*(max-min)/N)/rng)*(H-2*pad);
    body+=`<line x1="${x}" y1="${hl}" x2="${x}" y2="${ll}" stroke="${col}" stroke-width="1"/>`;
    body+=`<rect x="${x-cw*0.32}" y="${top}" width="${cw*0.64}" height="${hgt}" fill="${col}" rx="1"/>`;
  });
  // 末值参考线
  const lastY=H-pad-((series[N-1]-min)/rng)*(H-2*pad);
  body+=`<line x1="0" y1="${lastY}" x2="${W}" y2="${lastY}" stroke="var(--metals-gold-line)" stroke-width="1" stroke-dasharray="3 4"/>`;
  svg.innerHTML=body;
  // 成交量
  const vol=$('#vol'); let vb='';
  series.forEach((v,i)=>{ const x=i*cw+cw/2; const hgt=Math.random()*38+4; vb+=`<rect x="${x-cw*0.3}" y="${42-hgt}" width="${cw*0.6}" height="${hgt}" fill="var(--text-tertiary)" opacity="0.5"/>`; });
  vol.innerHTML=vb;
}

/* ---------- 周期切换（仅图表交互，无交易下单） ---------- */
$('#intervalSeg').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
  state.iv=b.dataset.iv;
  $('#intervalSeg').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
  drawKline(METALS.find(x=>x.id===state.sel));
}));

/* ---------- Toast ---------- */
function toast(msg,type='info'){
  const el=document.createElement('div'); el.className='toast '+type;
  const ic={ok:'✓',info:'i',warn:'!'}[type]||'i';
  el.innerHTML=`<span class="ic">${ic}</span><span>${msg}</span>`;
  $('#toasts').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(8px)'; setTimeout(()=>el.remove(),300); }, 2600);
}

/* ---------- 主题 / 刷新 / 抽屉 ---------- */
$('#themeBtn').addEventListener('click',()=>{
  const r=document.documentElement; r.dataset.theme = r.dataset.theme==='dark'?'light':'dark';
});
$('#refreshBtn').addEventListener('click',()=>{
  const b=$('#refreshBtn'); b.textContent='⟳ 更新中…'; b.disabled=true;
  setTimeout(()=>{ b.textContent='⟳ 刷新'; b.disabled=false; toast('行情已更新 23:'+String(new Date().getMinutes()).padStart(2,'0'),'ok'); }, reduced?0:900);
});
$('#detailClose').addEventListener('click',closeDetail);
$('#scrim').addEventListener('click',closeDetail);
function closeDetail(){ $('#detailPanel').classList.remove('open'); $('#scrim').classList.remove('show'); }

/* ---------- 初始化 ---------- */
renderWatch(); renderDetail();
</script>
