<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" role="img" aria-label="Pulse app icon">
  <defs>
    <linearGradient id="pulseBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="55%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#4CC1FF"/>
    </linearGradient>
    <clipPath id="pulseSquircle">
      <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- Squircle base with brand-blue gradient -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#pulseBg)"/>

  <!-- Subtle top-left gloss for app-icon depth -->
  <g clip-path="url(#pulseSquircle)">
    <path d="M 0 0 L 1024 0 L 1024 360 Q 512 470, 0 360 Z" fill="#ffffff" opacity="0.08"/>
  </g>

  <!-- ECG pulse line: heartbeat (P + QRS) with an upward tail = "updates" -->
  <path d="M 160 512 L 320 512 L 380 440 L 440 512 L 520 512 L 580 360 L 650 664 L 720 512 L 800 512 L 864 392"
        fill="none" stroke="#ffffff" stroke-width="56"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.98"/>
</svg>
