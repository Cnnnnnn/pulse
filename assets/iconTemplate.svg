<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!--
    Pulse tray icon — single clean ECG pulse, refined v3.
    Single R-S complex, no P/T waves. Wider 4:1 / 6:1 slopes.
    Stroke 1.8 (was 2.4) — thinner reads as 0.9 at 16x16, cleaner at small sizes.
  -->
  <path d="M 3 16 L 11 16 L 14 4 L 18 28 L 21 16 L 30 16"
        fill="none" stroke="#000000" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
