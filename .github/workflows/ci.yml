name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 同分支新 push 取消老 run, 不浪费 CI 时间
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test + Build renderer
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 2026-06: GitHub runner 的 bundled npm 跟项目里一票老 dep (rimraf 3,
      # glob 7-10) deprecate warn 之间 race condition 报 "Exit handler never
      # called!" (npm/cli #7666), step exit 1 但 node_modules 部分装好. npm
      # 10.8.2 也中招, 实际是 node 20 + deprecate warn 太多 race.
      #
      # 最稳: 改用 `npm install` (有 lifecycle hooks 容忍度更高) + 允许 exit
      # 1 fallback 到 `npm install` 重试 + 末尾校验关键 binary 在.
      - name: Pin npm to last-known-good
        run: npm install -g npm@10.8.2

      - name: Install deps (resilient)
        # GitHub runner 的 npm 跟项目里 ~10 个 transitive deprecate 触发的
        # "Exit handler never called!" (npm/cli #7666) 在 lifecycle hooks
        # 处理 signal 时 crash, 把 devDeps (vitest 等) 跳掉. 分两步: 先
        # --omit=dev 装 prod (确定性更高), 再装 devDeps, 最后 build bin-links
        # + 自验 vitest:
        run: |
          set -e
          rm -rf node_modules
          # 第一次: 仅 prod deps (lifecycle hook 少, 几乎不会 crash)
          set +e
          npm install --omit=dev --no-audit --no-fund
          PROD_RC=$?
          set -e
          echo "prod install rc=$PROD_RC"
          # 第二次: devDeps (vitest, jsdom, esbuild 等)
          set +e
          npm install --include=dev --no-audit --no-fund
          DEV_RC=$?
          set -e
          echo "dev install rc=$DEV_RC"
          # 强制重建 .bin symlinks
          npm rebuild --bin-links 2>/dev/null || true
          if [ ! -x node_modules/.bin/vitest ]; then
            echo "::error::vitest binary 仍未就位, 装 deps 失败"
            echo "PROD_RC=$PROD_RC DEV_RC=$DEV_RC"
            ls -la node_modules/.bin/ 2>&1 | head -20
            ls -la node_modules/vitest 2>&1 | head -5
            exit 1
          fi
          echo "vitest OK: $(./node_modules/.bin/vitest --version)"

      - name: Run unit tests
        # 用 ./node_modules/.bin/vitest 显式路径, 绕开 npm scripts 调用
        # vitest 时 PATH 解析不到的问题.
        run: ./node_modules/.bin/vitest --run

      - name: Build renderer bundle
        run: npm run build:renderer

      - name: Verify bundle produced
        run: |
          test -f renderer-dist/renderer.bundle.js
          echo "bundle size: $(du -h renderer-dist/renderer.bundle.js | cut -f1)"
