name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 同分支新 push 取消老 run, 不浪费 CI 时间
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test + Build renderer
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 2026-06: GitHub runner 的 bundled npm 跟项目里一票老 dep (rimraf 3,
      # glob 7-10) deprecate warn 之间 race condition 报 "Exit handler never
      # called!" (npm/cli #7666), step exit 1 但 node_modules 部分装好. npm
      # 10.8.2 也中招, 实际是 node 20 + deprecate warn 太多 race.
      #
      # 最稳: 改用 `npm install` (有 lifecycle hooks 容忍度更高) + 允许 exit
      # 1 fallback 到 `npm install` 重试 + 末尾校验关键 binary 在.
      - name: Pin npm to last-known-good
        run: npm install -g npm@10.8.2

      - name: Override registry to public npm
        # 本地 ~/.npmrc 指向 nexus.npt.seabank.io (公司私有 proxy), 在
        # GitHub runner 上 DNS 不通 (ENOTFOUND), 装 preact 之类直接挂.
        # CI 显式切到公共 registry, lockfile 的 integrity hash 还能校验.
        run: |
          npm config delete registry
          npm config delete //nexus.npt.seabank.io/repository/npm-bank/:_authToken
          npm config delete //nexus.npt.seabank.io/repository/npm-bank-hosted/:_authToken
          npm config delete //npm.shopee.io/:_authToken
          npm config set registry https://registry.npmjs.org/
          npm config get registry

      - name: Install deps (with retry)
        # npm install 在 lifecycle hook 处理 deprecate signal 时会 SIGSEGV
        # (npm/cli #7666), 重试直到 binary 装上. 3 次重试 + 每次 set +e
        # 接受 partial 状态:
        run: |
          echo "=== npm config relevant ==="
          echo "registry=$(npm config get registry)"
          echo "omit=$(npm config get omit)"
          echo "production=$(npm config get production)"
          echo "NODE_ENV=$NODE_ENV"
          echo "NPM_CONFIG_OMIT=$NPM_CONFIG_OMIT"
          for i in 1 2 3; do
            echo "=== install attempt $i ==="
            rm -rf node_modules
            set +e
            npm install --no-audit --no-fund --include=dev
            RC=$?
            set -e
            echo "rc=$RC"
            if [ -x node_modules/.bin/vitest ]; then
              echo "vitest OK on attempt $i"
              break
            fi
            if [ "$i" = "3" ]; then
              echo "::error::vitest 仍未就位, 3 次重试全失败"
              ls -la node_modules/.bin/ 2>&1 | head -20
              ls -la node_modules/ 2>&1 | head -10
              exit 1
            fi
            sleep 3
          done
          echo "vitest OK: $(./node_modules/.bin/vitest --version)"

      - name: Run unit tests
        # 用 ./node_modules/.bin/vitest 显式路径, 绕开 npm scripts 调用
        # vitest 时 PATH 解析不到的问题.
        run: ./node_modules/.bin/vitest --run

      - name: Build renderer bundle
        run: npm run build:renderer

      - name: Verify bundle produced
        run: |
          test -f renderer-dist/renderer.bundle.js
          echo "bundle size: $(du -h renderer-dist/renderer.bundle.js | cut -f1)"
