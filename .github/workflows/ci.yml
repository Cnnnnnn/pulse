name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# 同分支新 push 取消老 run, 不浪费 CI 时间
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test + Build renderer
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 2026-06: GitHub runner 的 bundled npm 9.x 在跑老 dependency tree (rimraf 3,
      # glob 7-10 等 deprecate) 时会 race condition 报 "Exit handler never
      # called!" 并整体 exit 1, 后续步骤拿不到 vitest binary. 锁 npm 10.8.2
      # (npm/cli #7666 验证的 last-known-good) 绕开.
      # 背景: https://github.com/npm/cli/issues/7666
      - name: Pin npm to last-known-good
        run: npm install -g npm@10.8.2

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Run unit tests
        run: npm test -- --run

      - name: Build renderer bundle
        run: npm run build:renderer

      - name: Verify bundle produced
        run: |
          test -f renderer-dist/renderer.bundle.js
          echo "bundle size: $(du -h renderer-dist/renderer.bundle.js | cut -f1)"
