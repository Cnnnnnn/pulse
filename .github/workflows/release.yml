name: Release Build

# Tag 推送 (v*) 或手动 dispatch 都触发.
# 用于生产 release, CI (.github/workflows/ci.yml) 仍负责 PR + main 跑的
# 单元测试 + renderer bundle, 跟这里解耦.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS (DMG + ZIP)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install -g npm@10.8.2
      - name: Install deps (resilient)
        # GitHub runner 的 npm 跟项目里 ~10 个 transitive deprecate 触发的
        # "Exit handler never called!" (npm/cli #7666) 在 lifecycle hooks
        # 处理 signal 时 crash, 把 devDeps (vitest 等) 跳掉. 分两步: 先
        # --omit=dev 装 prod (确定性更高), 再装 devDeps, 最后 build bin-links
        # + 自验 vitest:
        run: |
          set -e
          rm -rf node_modules
          # 第一次: 仅 prod deps (lifecycle hook 少, 几乎不会 crash)
          set +e
          npm install --omit=dev --no-audit --no-fund
          PROD_RC=$?
          set -e
          echo "prod install rc=$PROD_RC"
          # 第二次: devDeps (vitest, jsdom, esbuild 等)
          set +e
          npm install --include=dev --no-audit --no-fund
          DEV_RC=$?
          set -e
          echo "dev install rc=$DEV_RC"
          # 强制重建 .bin symlinks
          npm rebuild --bin-links 2>/dev/null || true
          if [ ! -x node_modules/.bin/vitest ]; then
            echo "::error::vitest binary 仍未就位, 装 deps 失败"
            echo "PROD_RC=$PROD_RC DEV_RC=$DEV_RC"
            ls -la node_modules/.bin/ 2>&1 | head -20
            ls -la node_modules/vitest 2>&1 | head -5
            exit 1
          fi
          echo "vitest OK: $(./node_modules/.bin/vitest --version)"
      - run: ./node_modules/.bin/vitest --run
      - run: npm run build:renderer
      - name: Build macOS (electron-builder)
        run: npm run build:mac
        env:
          # 本机 dev build 跳过代码签名; 正式发布时配 Apple Developer 证书.
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn

  build-win:
    name: Build Windows (NSIS .exe)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install -g npm@10.8.2
      - name: Install deps (resilient)
        # GitHub runner 的 npm 跟项目里 ~10 个 transitive deprecate 触发的
        # "Exit handler never called!" (npm/cli #7666) 在 lifecycle hooks
        # 处理 signal 时 crash, 把 devDeps (vitest 等) 跳掉. 分两步: 先
        # --omit=dev 装 prod (确定性更高), 再装 devDeps, 最后 build bin-links
        # + 自验 vitest:
        run: |
          set -e
          rm -rf node_modules
          # 第一次: 仅 prod deps (lifecycle hook 少, 几乎不会 crash)
          set +e
          npm install --omit=dev --no-audit --no-fund
          PROD_RC=$?
          set -e
          echo "prod install rc=$PROD_RC"
          # 第二次: devDeps (vitest, jsdom, esbuild 等)
          set +e
          npm install --include=dev --no-audit --no-fund
          DEV_RC=$?
          set -e
          echo "dev install rc=$DEV_RC"
          # 强制重建 .bin symlinks
          npm rebuild --bin-links 2>/dev/null || true
          if [ ! -x node_modules/.bin/vitest ]; then
            echo "::error::vitest binary 仍未就位, 装 deps 失败"
            echo "PROD_RC=$PROD_RC DEV_RC=$DEV_RC"
            ls -la node_modules/.bin/ 2>&1 | head -20
            ls -la node_modules/vitest 2>&1 | head -5
            exit 1
          fi
          echo "vitest OK: $(./node_modules/.bin/vitest --version)"
      - run: ./node_modules/.bin/vitest --run
      - run: npm run build:renderer
      - name: Build Windows (electron-builder NSIS)
        run: npm run build:win
        env:
          # NSIS 跳过代码签名 (dev); 正式发布前配 EV 证书
          # (CSC_LINK base64 + CSC_KEY_PASSWORD).
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-windows
          path: |
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: warn