name: Release Build

# Tag 推送 (v*) 或手动 dispatch 都触发.
# 用于生产 release, CI (.github/workflows/ci.yml) 仍负责 PR + main 跑的
# 单元测试 + renderer bundle, 跟这里解耦.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS (DMG + ZIP)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install -g npm@10.8.2
      - name: Override registry to public npm
        # lockfile 里 250 处 resolved 指向 nexus.npt.seabank.io (公司私有
        # proxy), 在 GitHub runner 上 ENOTFOUND, 装 preact 之类直接挂. CI
        # 显式切到公共 registry, lockfile integrity hash 还能校验.
        run: |
          npm config delete registry
          npm config delete //nexus.npt.seabank.io/repository/npm-bank/:_authToken
          npm config delete //nexus.npt.seabank.io/repository/npm-bank-hosted/:_authToken
          npm config delete //npm.shopee.io/:_authToken
          npm config set registry https://registry.npmjs.org/
          npm config get registry
      - name: Install deps (with retry)
        # npm install 在 lifecycle hook 处理 deprecate signal 时会 SIGSEGV
        # (npm/cli #7666), 重试直到 binary 装上. 3 次重试 + 每次 set +e
        # 接受 partial 状态:
        run: |
          echo "=== npm config relevant ==="
          echo "registry=$(npm config get registry)"
          echo "omit=$(npm config get omit)"
          echo "production=$(npm config get production)"
          echo "NODE_ENV=$NODE_ENV"
          echo "NPM_CONFIG_OMIT=$NPM_CONFIG_OMIT"
          for i in 1 2 3; do
            echo "=== install attempt $i ==="
            rm -rf node_modules
            set +e
            npm install --no-audit --no-fund --include=dev
            RC=$?
            set -e
            echo "rc=$RC"
            if [ -x node_modules/.bin/vitest ]; then
              echo "vitest OK on attempt $i"
              break
            fi
            if [ "$i" = "3" ]; then
              echo "::error::vitest 仍未就位, 3 次重试全失败"
              ls -la node_modules/.bin/ 2>&1 | head -20
              ls -la node_modules/ 2>&1 | head -10
              exit 1
            fi
            sleep 3
          done
          echo "vitest OK: $(./node_modules/.bin/vitest --version)"
      - run: ./node_modules/.bin/vitest --run
      - run: npm run build:renderer
      - name: Build macOS (electron-builder)
        run: npm run build:mac
        env:
          # 本机 dev build 跳过代码签名; 正式发布时配 Apple Developer 证书.
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn

  build-win:
    name: Build Windows (NSIS .exe)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install -g npm@10.8.2
      - name: Override registry to public npm
        # lockfile 里 250 处 resolved 指向 nexus.npt.seabank.io (公司私有
        # proxy), 在 GitHub runner 上 ENOTFOUND, 装 preact 之类直接挂. CI
        # 显式切到公共 registry, lockfile integrity hash 还能校验.
        run: |
          npm config delete registry
          npm config delete //nexus.npt.seabank.io/repository/npm-bank/:_authToken
          npm config delete //nexus.npt.seabank.io/repository/npm-bank-hosted/:_authToken
          npm config delete //npm.shopee.io/:_authToken
          npm config set registry https://registry.npmjs.org/
          npm config get registry
      - name: Install deps (with retry)
        # npm install 在 lifecycle hook 处理 deprecate signal 时会 SIGSEGV
        # (npm/cli #7666), 重试直到 binary 装上. 3 次重试 + 每次 set +e
        # 接受 partial 状态:
        run: |
          echo "=== npm config relevant ==="
          echo "registry=$(npm config get registry)"
          echo "omit=$(npm config get omit)"
          echo "production=$(npm config get production)"
          echo "NODE_ENV=$NODE_ENV"
          echo "NPM_CONFIG_OMIT=$NPM_CONFIG_OMIT"
          for i in 1 2 3; do
            echo "=== install attempt $i ==="
            rm -rf node_modules
            set +e
            npm install --no-audit --no-fund --include=dev
            RC=$?
            set -e
            echo "rc=$RC"
            if [ -x node_modules/.bin/vitest ]; then
              echo "vitest OK on attempt $i"
              break
            fi
            if [ "$i" = "3" ]; then
              echo "::error::vitest 仍未就位, 3 次重试全失败"
              ls -la node_modules/.bin/ 2>&1 | head -20
              ls -la node_modules/ 2>&1 | head -10
              exit 1
            fi
            sleep 3
          done
          echo "vitest OK: $(./node_modules/.bin/vitest --version)"
      - run: ./node_modules/.bin/vitest --run
      - run: npm run build:renderer
      - name: Build Windows (electron-builder NSIS)
        run: npm run build:win
        env:
          # NSIS 跳过代码签名 (dev); 正式发布前配 EV 证书
          # (CSC_LINK base64 + CSC_KEY_PASSWORD).
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: pulse-windows
          path: |
            dist/*.exe
            dist/*.blockmap
          if-no-files-found: warn